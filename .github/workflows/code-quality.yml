name: Code Quality & Build

on:
    push:
        branches: [master, dev]
    pull_request:
        branches: [master]

jobs:
    validate-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: '10.33.0'

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25.8.2'
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Pre-linting build
              run: pnpm run build

            - name: Execute Auto-Fixes
              run: pnpm run chore:fix

            - name: Post-linting build
              run: pnpm run build

            - name: Verify Remaining Issues
              run: pnpm run chore:lint

            - name: Commit Fixed Files
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: 'chore: automated lint fixes [skip ci]'
